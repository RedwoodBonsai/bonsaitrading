<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonsai Trading Systems</title>
<meta name="description" content="Systematic trading signals, precisely cultivated. Institutional-grade intelligence for independent investors.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1A0F;
    --bg-deep: #071209;
    --green-bright: #4ADE80;
    --green-mid: #22C55E;
    --green-dark: #16A34A;
    --green-dim: #15803D;
    --green-muted: rgba(74, 222, 128, 0.35);
    --green-subtle: rgba(74, 222, 128, 0.12);
    --white: #F0F0EC;
    --white-dim: rgba(240, 240, 236, 0.55);
    --white-faint: rgba(240, 240, 236, 0.3);
    --footer-text: rgba(240, 240, 236, 0.25);
    --rule: rgba(74, 222, 128, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── Radial glow ─── */
  body::before {
    content: '';
    position: fixed;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse at center, rgba(74, 222, 128, 0.06) 0%, rgba(34, 197, 94, 0.02) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Main ─── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 32px 40px;
    position: relative;
    z-index: 1;
  }

  /* ─── Bonsai candlestick SVG ─── */
  .bonsai-icon {
    width: 280px;
    height: auto;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    
  }

  /* ─── Wordmark ─── */
  .wordmark {
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  .wordmark h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: clamp(48px, 9vw, 80px);
    color: var(--white);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .wordmark .sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(11px, 2vw, 15px);
    letter-spacing: 0.4em;
    color: var(--green-mid);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ─── Rule ─── */
  .rule {
    width: 60px;
    height: 1px;
    background: var(--rule);
    margin: 48px auto;
    opacity: 0;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
  }

  /* ─── Tagline ─── */
  .tagline {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(17px, 2.5vw, 24px);
    color: var(--white-dim);
    letter-spacing: 0.01em;
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
  }

  /* ─── Sub-tagline ─── */
  .sub-tagline {
    text-align: center;
    margin-top: 18px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(9px, 1.4vw, 11px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white-faint);
    opacity: 0;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
  }

  /* ─── Footer ─── */
  footer {
    position: relative;
    z-index: 1;
    padding: 24px 32px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--rule);
    flex-wrap: wrap;
    gap: 12px;
  }

  footer p {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--footer-text);
  }

  footer a {
    color: var(--footer-text);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  footer a:hover {
    color: var(--green-mid);
  }

  /* ─── Star accent ─── */
  .star {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 20px;
    height: 20px;
    opacity: 0;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
    z-index: 2;
  }

  /* ─── Animations ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    main { padding: 48px 24px 32px; }
    .bonsai-icon { width: 200px; }
    .rule { margin: 36px auto; }
    footer {
      flex-direction: column;
      text-align: center;
      padding: 20px 24px 24px;
    }
  }
</style>
</head>
